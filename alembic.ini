# Alembic-Konfiguration für idvscope
# ----------------------------------
# Schema-Migrationen werden über nummerierte Revisions in alembic/versions/
# verwaltet. ``sqlalchemy.url`` wird zur Laufzeit von ``db._alembic_config``
# aus dem aktiven DB-Pfad gesetzt; der hier hinterlegte Wert dient
# ausschließlich Offline-Tools (``alembic revision``, ``alembic history``).

[alembic]
script_location = migrations

# Platzhalter für Offline-Aufrufe; die Anwendung überschreibt diesen Wert
# mit dem tatsächlichen DB-Pfad (siehe db._alembic_cfg).
sqlalchemy.url = sqlite:///instance/idvscope.db

# Konsistenter Timestamp-Präfix für neue Revisionsdateien.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Pfadtrennzeichen für version_locations (unter Windows sonst fehlerhaft).
version_path_separator = os

# ----------------------------------
# Logging
# ----------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
