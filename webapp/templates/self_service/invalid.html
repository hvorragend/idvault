{% extends "self_service/_base.html" %}
{% block title %}Link ungültig – IDVScope{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-body text-center py-5">
    <i class="bi bi-exclamation-triangle text-danger" style="font-size:2.5rem;"></i>
    <h5 class="mt-3">Link ungültig oder abgelaufen</h5>
    <p class="text-muted mb-0">{{ grund }}</p>
    <p class="text-muted small mt-3 mb-0">
      Bitte wenden Sie sich an den IDV-Koordinator, wenn Sie erneut einen
      Self-Service-Link benötigen.
    </p>
  </div>
</div>
{% endblock %}
