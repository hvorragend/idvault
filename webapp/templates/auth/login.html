<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDVScope – Anmeldung</title>
  <link href="{{ url_for('static', filename='vendor/bootstrap-5.3.3/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='vendor/bootstrap-icons-1.11.3/bootstrap-icons.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/idvscope.css') }}" rel="stylesheet">
  <style>
    body { background: var(--idv-bg); }
    .login-card { max-width: 420px; border-radius: var(--radius-xl); border: none; box-shadow: var(--shadow-lg); }
    .brand { font-size: 2rem; font-weight: 700; color: var(--slate-900); letter-spacing: -1px; }
    .brand span { color: var(--amber-500); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card card shadow-lg p-4 w-100 mx-3">
    <div class="text-center mb-4">
      <div class="brand">idv<span>ault</span></div>
      <div class="text-muted small">Register · MaRisk AT 7.2 / DORA</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-danger">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    {% if ldap_active %}
    <div class="alert alert-info py-2 mb-3 small">
      <i class="bi bi-diagram-3 me-1"></i>
      <strong>Active Directory aktiv</strong> – User-ID (AD-Anmeldename) und Passwort eingeben.
    </div>
    {% endif %}

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Benutzername</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" autofocus
                 placeholder="User-ID"
                 autocomplete="username">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Passwort</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Anmelden
      </button>
    </form>
  </div>
</body>
</html>
