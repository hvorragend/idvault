{% extends "base.html" %}
{% block title %}Glossar – Erläuterungstexte bearbeiten{% endblock %}
{% block page_title %}
<i class="bi bi-book me-2"></i>Glossar – Erläuterungstexte
{% endblock %}

{% block content %}
{% include 'admin/_subnav.html' %}

<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-600">
        <i class="bi bi-text-paragraph me-1"></i>Erläuterungstexte auf der Glossar-Seite
      </div>
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-4">
            <label class="form-label fw-600">Info-Box oben</label>
            <textarea name="glossar_hintergrund_text" class="form-control" rows="4"
                      placeholder="Text der Info-Box am Seitenanfang">{{ settings.get('glossar_hintergrund_text', '') }}</textarea>
          </div>

          <div class="mb-4">
            <label class="form-label fw-600">Info-Box unten</label>
            <textarea name="glossar_info_unten" class="form-control" rows="8"
                      placeholder="Text der Info-Box am Seitenende (Zeilenumbrüche werden beibehalten)">{{ settings.get('glossar_info_unten', '') }}</textarea>
          </div>

          <div class="d-flex gap-2 justify-content-end">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-floppy me-1"></i>Speichern
            </button>
            <a href="{{ url_for('admin.glossar_overview') }}" class="btn btn-outline-secondary">Zurück</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
