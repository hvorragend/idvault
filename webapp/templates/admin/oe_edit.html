{% extends "base.html" %}
{% block title %}OE bearbeiten{% endblock %}
{% block page_title %}<i class="bi bi-diagram-3 me-2"></i>Organisationseinheit bearbeiten{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-600">{{ oe.bezeichnung }}</div>
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="row g-3">
            <div class="col-md-7">
              <label class="form-label fw-600">Bezeichnung <span class="text-danger">*</span></label>
              <input type="text" name="bezeichnung" class="form-control" value="{{ oe.bezeichnung }}" required>
            </div>
            <div class="col-md-5">
              <label class="form-label fw-600">Übergeordnete OE</label>
              <select name="parent_id" class="form-select">
                <option value="">– keine –</option>
                {% for ou in all_oe %}
                <option value="{{ ou.id }}" {{ 'selected' if oe.parent_id == ou.id else '' }}>
                  {{ ou.bezeichnung }}
                </option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-floppy me-1"></i>Speichern</button>
            <a href="{{ url_for('admin.index') }}" class="btn btn-outline-secondary">Abbrechen</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
