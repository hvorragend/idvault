{% extends "base.html" %}
{% block title %}App wird neu gestartet{% endblock %}
{% block page_title %}<i class="bi bi-arrow-clockwise me-2"></i>Neustart{% endblock %}

{% block content %}
<div class="text-center py-5">
  <div class="spinner-border text-primary mb-4" role="status" style="width:3rem;height:3rem">
    <span class="visually-hidden">Lädt…</span>
  </div>
  <h4 class="mb-2">App wird neu gestartet…</h4>
  <p class="text-muted" id="status-msg">
    Warte auf Server…
  </p>
  <p class="text-muted" style="font-size:.85rem">
    Falls die Weiterleitung nicht funktioniert: <a href="/">hier klicken</a>
  </p>
</div>

<script>
(function () {
  var attempts = 0;
  var msg = document.getElementById("status-msg");

  function tryRedirect() {
    attempts++;
    fetch("/", { method: "HEAD", cache: "no-store" })
      .then(function (r) {
        if (r.ok) {
          msg.textContent = "Server bereit – wird weitergeleitet…";
          window.location.href = "/";
        } else {
          schedule();
        }
      })
      .catch(function () {
        msg.textContent = "Warte auf Server… (Versuch " + attempts + ")";
        if (attempts < 60) schedule();
        else msg.innerHTML = 'Server nicht erreichbar. <a href="/">Manuell öffnen</a>.';
      });
  }

  function schedule() {
    setTimeout(tryRedirect, 1500);
  }

  // Erster Versuch nach 2 Sekunden (Prozess braucht etwas Zeit zum Starten)
  setTimeout(tryRedirect, 2000);
})();
</script>
{% endblock %}
